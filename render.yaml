






services:
  - type: web
    name: jobot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DB_PATH
        # FIX: Render's /opt/render/project/src is ephemeral on free tier.
        # Using a path under the project src keeps the DB across deploys.
        # For true persistence, upgrade to a paid plan or use a Render Disk.
        value: /opt/render/project/src/data/jobot.db
      - key: PORT
        value: 8080